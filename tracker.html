<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<meta name="theme-color" content="#0a0a0f">
<title>Health Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--card:#161620;--card2:#1e1e2a;--border:#2a2a3a;--text:#e8e8f0;--dim:#888898;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--teal:#14b8a6;--pink:#ec4899;--radius:14px;--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-top:var(--safe-top);padding-bottom:calc(70px + var(--safe-bot));overflow-x:hidden;font-size:14px}
.app{max-width:430px;margin:0 auto;padding:12px 14px 20px}
h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.sub{font-size:11px;color:var(--dim);margin-top:2px}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.label{font-size:12px;color:var(--dim);min-width:90px;display:flex;align-items:center;gap:5px}
.scale{display:flex;gap:2px;flex:1}
.scale-bar{flex:1;height:26px;border-radius:5px;border:none;cursor:pointer;transition:all .1s}
.scale-val{font-size:13px;font-weight:600;min-width:30px;text-align:right}
input[type=time],input[type=number],input[type=text],textarea,select{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none}
input[type=time]{width:95px}input[type=number]{width:55px}
textarea{width:100%;resize:vertical;min-height:50px}
.btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--dim);width:100%;padding:10px}
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--dim);transition:all .15s;margin:2px}
.pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.dose-btn{width:34px;height:34px;border-radius:17px;border:none;font-size:15px;cursor:pointer;transition:all .15s}
.dose-btn.on{background:var(--accent);color:#fff}
.dose-btn.off{background:var(--card2);color:var(--dim)}
.mg-btn{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid var(--border);cursor:pointer;background:var(--card2);color:var(--dim)}
.mg-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.creon-btn{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;font-size:11px;font-weight:500;color:var(--dim);font-family:inherit}
.creon-btn.on{border-color:var(--green);background:rgba(34,197,94,.12);color:var(--green)}
.bristol-btn{flex:1;padding:6px 2px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;font-size:9px;color:var(--dim);font-family:inherit}
.bristol-btn.on{color:#fff}
.social-btn{flex:1;padding:10px 2px;border-radius:10px;border:1px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;font-family:inherit}
.social-btn.on{border-color:var(--accent);background:rgba(99,102,241,.15)}
.pomo-btn{width:32px;height:32px;border-radius:16px;border:1px solid var(--border);background:var(--card2);color:var(--dim);font-size:16px;cursor:pointer}
.uri-row{display:flex;align-items:center;gap:4px;background:var(--card2);border-radius:8px;padding:6px 8px;margin-bottom:5px;font-size:11px}
.del-btn{background:none;border:none;color:var(--red);font-size:15px;cursor:pointer;padding:0 4px;margin-left:auto}
.meal-card{background:var(--card2);border-radius:12px;padding:11px;margin-bottom:8px;border:1px solid var(--border)}
.cat-pill{padding:3px 7px;border-radius:12px;font-size:9px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:inherit;margin:1px}
.cat-pill.on{background:rgba(99,102,241,.2);color:var(--accent);border-color:var(--accent)}
.week-bar{display:flex;gap:3px;justify-content:center;margin-bottom:12px}
.week-day{flex:1;padding:5px 1px;border-radius:10px;text-align:center;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-family:inherit;color:var(--text)}
.week-day.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.week-day.today:not(.sel){border-color:var(--accent)}
.week-nav{background:none;border:none;color:var(--dim);font-size:17px;cursor:pointer;padding:4px 6px}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--safe-bot));z-index:99}
.nav-btn{flex:1;text-align:center;padding:6px 0;background:none;border:none;color:var(--dim);font-size:10px;cursor:pointer;font-family:inherit;font-weight:500}
.nav-btn.active{color:var(--accent)}
.nav-icon{font-size:20px;display:block;margin-bottom:2px}
.hist-row{background:var(--card);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border)}
.hist-row.today{border-color:var(--accent)}
.completion{height:3px;background:var(--card2);border-radius:2px;margin-bottom:12px}
.completion-fill{height:3px;border-radius:2px;background:var(--accent);transition:width .3s}
.flex{display:flex}.gap{gap:8px}.between{justify-content:space-between}.center{align-items:center}
.split{display:flex;gap:14px}.split>div{flex:1}
.divider{width:1px;background:var(--border);align-self:stretch}
.mic-btn{width:36px;height:36px;border-radius:18px;border:1px solid var(--border);background:var(--card2);color:var(--dim);font-size:18px;cursor:pointer;flex-shrink:0;transition:all .2s}
.mic-btn.recording{background:var(--red);color:#fff;border-color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<nav class="nav" id="nav"></nav>
<script>
const $=id=>document.getElementById(id);
const SK='ht-v5';
const td=()=>new Date().toISOString().slice(0,10);
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const BRISTOL=[{v:1,l:'Billes',c:'#ef4444'},{v:2,l:'Bosselé',c:'#ef4444'},{v:3,l:'Craquelé',c:'#f59e0b'},{v:4,l:'Lisse',c:'#22c55e'},{v:5,l:'Mou',c:'#22c55e'},{v:6,l:'Pâteux',c:'#f59e0b'},{v:7,l:'Liquide',c:'#ef4444'}];
const SOCIAL=[{v:0,l:'Seul',e:'🚫'},{v:1,l:'Bref',e:'👋'},{v:2,l:'Modéré',e:'🗣️'},{v:3,l:'Riche',e:'🤝'}];
const MCAT=['Protéines','Glucides','Légumes','Fruits','Laitiers','Graisses','Sucre/UT'];
const ME={'Protéines':'🥩','Glucides':'🍚','Légumes':'🥦','Fruits':'🍎','Laitiers':'🧀','Graisses':'🥑','Sucre/UT':'🍬'};

let state={entries:{},sel:td(),tab:'log'};
try{const s=localStorage.getItem(SK);if(s)state.entries=JSON.parse(s)}catch(e){}

function save(){try{localStorage.setItem(SK,JSON.stringify(state.entries))}catch(e){}}
function E(){return state.entries[state.sel]||dflt()}
function S(u){state.entries[state.sel]={...E(),...u,date:state.sel};save();render()}
function dflt(){return{date:td(),mood_am:0,mood_pm:0,energy_am:0,energy_pm:0,stress:0,hydration:0,medikinet:[false,false,false],med_doses:[10,10,10],med_times:['','',''],creon:[0,0,0],caffeine_count:0,last_caffeine:'',bristol:0,stool_color:'',focus:0,pomodoros:0,anki_done:0,anki_total:0,social:null,screen_before_bed:0,nap:false,nap_duration:0,morning_light:false,last_meal_time:'',meals:[{label:'Petit-déj',time:'',desc:'',cats:[]},{label:'Déjeuner',time:'',desc:'',cats:[]},{label:'Dîner',time:'',desc:'',cats:[]}],urinations:[],notes:''}}

function scaleColor(v,max){const p=v/max;return p<=.3?'var(--red)':p<=.6?'var(--amber)':'var(--green)'}
function now(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}

function scaleHTML(id,label,emoji,val,max=10){
  let h=`<div class="row"><span class="label">${emoji} ${label}</span><div class="scale">`;
  for(let i=0;i<max;i++){
    const on=i<val;const c=val>0?scaleColor(val,max):'var(--card2)';
    h+=`<button class="scale-bar" style="background:${on?c:'var(--card2)'};opacity:${on?(.4+(i/max)*.6):1}" onclick="S({${id}:${i+1===val?0:i+1}})">&nbsp;</button>`;
  }
  h+=`</div><span class="scale-val">${val||'–'}/${max}</span></div>`;
  return h;
}

function comp(){
  const e=E();let s=0,t=11;
  if(e.mood_am)s++;if(e.mood_pm)s++;if(e.energy_am)s++;if(e.energy_pm)s++;
  if(e.stress)s++;if(e.hydration)s++;
  if(e.medikinet?.some(Boolean))s++;if(e.creon?.some(v=>v>0))s++;
  if(e.caffeine_count||e.last_caffeine)s++;if(e.bristol)s++;
  if(e.social!==null&&e.social!==undefined)s++;
  if(e.meals?.some(m=>m.desc))s++;
  return Math.round(s/t*100);
}

function renderLog(){
  const e=E();
  const mc=e.medikinet?.filter(Boolean).length||0;
  const totalMg=e.medikinet?.reduce((s,t,i)=>s+(t?(e.med_doses||[10,10,10])[i]:0),0)||0;
  const ap=null;

  return `
  <button id="uri-timer-btn" style="width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:all .2s;background:${window._uriStart?'var(--red)':'var(--accent)'};color:#fff" onclick="toggleUriTimer()">
    ${window._uriStart?'⏱ Arrêter — <span id=\"uri-timer-display\">0s</span>':'🚽 Uriner'}
  </button>

  <div class="card">
    <div style="font-size:11px;font-weight:600;color:var(--dim);margin-bottom:8px">☀️ Matin</div>
    ${scaleHTML('mood_am','Humeur','😊',e.mood_am)}
    ${scaleHTML('energy_am','Énergie','⚡',e.energy_am)}
    <div style="height:1px;background:var(--border);margin:10px 0"></div>
    <div style="font-size:11px;font-weight:600;color:var(--dim);margin-bottom:8px">🌙 Soir</div>
    ${scaleHTML('mood_pm','Humeur','😊',e.mood_pm)}
    ${scaleHTML('energy_pm','Énergie','⚡',e.energy_pm)}
  </div>

  <div class="card">
    ${scaleHTML('stress','Stress cognitif','🧠',e.stress,5)}
    <div class="row">
      <span class="label">💧 Eau (L)</span>
      <div class="flex" style="gap:3px">
        ${[0.5,1,1.5,2,2.5,3].map(n=>`<button class="mg-btn ${e.hydration===n?'on':''}" style="min-width:32px;height:28px;font-size:11px" onclick="S({hydration:${e.hydration===n?0:n}})">${n}</button>`).join('')}
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💊 Medikinet</div>
    <div class="flex gap" style="justify-content:center">
      ${[0,1,2].map(i=>{
        const on=(e.medikinet||[])[i];
        const dose=(e.med_doses||[10,10,10])[i];
        const time=(e.med_times||['','',''])[i];
        return `<div style="text-align:center;flex:1;background:var(--card2);border-radius:10px;padding:8px 4px;border:1px solid ${on?'var(--green)':'var(--border)'}">
          <div style="font-size:10px;font-weight:500;color:${on?'var(--green)':'var(--dim)'}; margin-bottom:5px">Dose ${i+1}</div>
          <button style="width:38px;height:38px;border-radius:19px;border:none;font-size:17px;cursor:pointer;background:${on?'var(--green)':'var(--card)'};color:${on?'#fff':'var(--dim)'}" onclick="toggleMed(${i})">${on?'✓':'○'}</button>
          <div class="flex gap" style="justify-content:center;margin-top:5px">
            ${[5,10,15].map(d=>`<button class="mg-btn ${dose===d?'on':''}" onclick="setMedDose(${i},${d})">${d}</button>`).join('')}
          </div>
          ${on?`<input type="time" value="${time||''}" style="width:75px;padding:2px 4px;font-size:10px;margin-top:4px;text-align:center" onchange="setMedTime(${i},this.value)">`:`<div style="font-size:9px;color:var(--dim);margin-top:4px">non pris</div>`}
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;font-size:10px;color:var(--dim);margin-top:6px">${mc}/3 · ${totalMg}mg</div>
  </div>

  <div class="card">
    <div class="card-title">💊 Créon (enzymes)</div>
    <div class="flex gap">
      ${['Petit-déj','Déjeuner','Dîner'].map((l,i)=>{
        const n=(e.creon||[0,0,0])[i]||0;
        return`<div style="flex:1;text-align:center;background:var(--card2);border-radius:10px;padding:8px 4px;border:1px solid ${n>0?'var(--green)':'var(--border)'}">
          <div style="font-size:11px;font-weight:500;color:${n>0?'var(--green)':'var(--dim)'}; margin-bottom:6px">${l}</div>
          <div class="flex center" style="justify-content:center;gap:6px">
            <button class="pomo-btn" style="width:26px;height:26px;font-size:14px" onclick="adjCreon(${i},-1)">−</button>
            <span style="font-size:16px;font-weight:700;min-width:18px">${n}</span>
            <button class="pomo-btn" style="width:26px;height:26px;font-size:14px" onclick="adjCreon(${i},1)">+</button>
          </div>
        </div>`}).join('')}
    </div>
    <div style="text-align:center;font-size:10px;color:var(--dim);margin-top:5px">${(e.creon||[0,0,0]).reduce((a,b)=>a+b,0)} capsules total</div>
  </div>

  <div class="card">
    <div class="card-title">☕ Caféine</div>
    <div class="row">
      <span class="label">Nombre</span>
      <div class="flex" style="gap:3px">
        ${[0,1,2,3,4,5].map(n=>`<button class="mg-btn ${e.caffeine_count===n?'on':''}" style="width:28px;height:26px" onclick="S({caffeine_count:${n}})">${n}</button>`).join('')}
      </div>
    </div>
    <div class="row">
      <span class="label">⏰ Dernier</span>
      <input type="time" value="${e.last_caffeine||''}" onchange="S({last_caffeine:this.value})">
    </div>
  </div>

  <div class="card">
    <div class="card-title">🤝 Interaction sociale</div>
    <div class="flex gap">
      ${SOCIAL.map(s=>`<button class="social-btn ${e.social===s.v?'on':''}" onclick="S({social:${e.social===s.v?'null':s.v}})">
        <div style="font-size:18px">${s.e}</div>
        <div style="font-size:10px;color:${e.social===s.v?'var(--accent)':'var(--dim)'}; margin-top:2px">${s.l}</div>
      </button>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🚽 Transit (Bristol)</div>
    <div class="flex" style="gap:3px">
      ${BRISTOL.map(b=>`<button class="bristol-btn ${e.bristol===b.v?'on':''}" style="${e.bristol===b.v?`background:${b.c};color:#fff;border-color:${b.c}`:''}" onclick="S({bristol:${e.bristol===b.v?0:b.v}})">
        <div style="font-size:15px;font-weight:700">${b.v}</div>
        <div>${b.l}</div>
      </button>`).join('')}
    </div>
    ${e.bristol?`<div style="text-align:center;font-size:10px;color:var(--dim);margin-top:4px">${e.bristol<=2?'Constipation — risque DIOS':e.bristol<=5?'Normal ✓':'Malabsorption possible'}</div>`:''}
    <div style="margin-top:10px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:6px">Couleur</div>
      <div class="flex" style="gap:4px">
        ${[
          {v:'jaune_clair',l:'Jaune clair',c:'#f0d060',t:'#654',warn:'Stéatorrhée possible — vérifier dose Créon'},
          {v:'jaune',l:'Jaune',c:'#c8a830',t:'#fff',warn:''},
          {v:'moutarde',l:'Moutarde',c:'#a08020',t:'#fff',warn:''},
          {v:'brun_clair',l:'Brun clair',c:'#8B6914',t:'#fff',warn:''},
          {v:'brun',l:'Brun',c:'#5C4033',t:'#fff',warn:'Normal ✓'},
          {v:'brun_fonce',l:'Brun foncé',c:'#3B2412',t:'#fff',warn:'Normal'},
        ].map(s=>`<button style="flex:1;padding:8px 2px;border-radius:8px;cursor:pointer;font-family:inherit;text-align:center;border:${e.stool_color===s.v?'2px solid var(--accent)':'1px solid var(--border)'};background:${s.c};color:${s.t};font-size:8px;font-weight:600" onclick="S({stool_color:'${e.stool_color===s.v?'':s.v}'})">${s.l}</button>`).join('')}
      </div>
      ${e.stool_color==='jaune_clair'?'<div style="text-align:center;font-size:10px;color:var(--amber);margin-top:5px">⚠️ Stéatorrhée possible — augmenter dose Créon</div>':''}
      ${e.stool_color==='brun'||e.stool_color==='brun_fonce'?'<div style="text-align:center;font-size:10px;color:var(--green);margin-top:5px">Absorption normale ✓</div>':''}
    </div>
  </div>

  <div class="card">
    <div class="card-title">😴 Sommeil & récup</div>
    <div class="row"><span class="label">🍽 Dernier repas</span><input type="time" value="${e.last_meal_time||''}" onchange="S({last_meal_time:this.value})"></div>
    <div class="row"><span class="label">📱 Écran</span><input type="number" value="${e.screen_before_bed||''}" placeholder="min" onchange="S({screen_before_bed:+this.value||0})"><span style="font-size:10px;color:var(--dim)">min avant lit</span></div>
    <div class="row"><span class="label">😴 Sieste</span>
      <button class="mg-btn ${e.nap?'on':''}" onclick="S({nap:!E().nap})">${e.nap?'Oui':'Non'}</button>
      ${e.nap?`<input type="number" value="${e.nap_duration||''}" placeholder="min" style="width:50px" onchange="S({nap_duration:+this.value||0})"><span style="font-size:10px;color:var(--dim)">min</span>`:''}
    </div>
    <div class="row"><span class="label">☀️ Lumière AM</span>
      <button class="mg-btn ${e.morning_light?'on':''}" onclick="S({morning_light:!E().morning_light})">${e.morning_light?'Oui':'Non'}</button>
    </div>
  </div>

  <div class="card">
    <div class="flex between center" style="margin-bottom:8px">
      <div class="card-title" style="margin:0">🚽 Mictions</div>
      <span style="font-size:10px;color:var(--dim)">${(e.urinations||[]).length}× · ${(e.urinations||[]).reduce((s,u)=>s+(u.sec||0),0)}s</span>
    </div>
    ${(e.urinations||[]).map((u,i)=>`<div class="uri-row">
      <span style="color:var(--dim);min-width:18px">#${i+1}</span>
      <input type="time" value="${u.time||''}" style="width:80px;padding:3px 5px;font-size:11px" onchange="updUri(${i},'time',this.value)">
      <input type="number" value="${u.sec||''}" placeholder="sec" style="width:42px;padding:3px 5px;font-size:11px" onchange="updUri(${i},'sec',+this.value||0)">
      <span style="font-size:9px;color:var(--dim)">s</span>
      <select style="padding:3px;font-size:10px" onchange="updUri(${i},'color',this.value)">
        <option value="" ${!u.color?'selected':''}>—</option>
        <option value="clair" ${u.color==='clair'?'selected':''}>clair</option>
        <option value="jaune" ${u.color==='jaune'?'selected':''}>jaune</option>
        <option value="foncé" ${u.color==='foncé'?'selected':''}>foncé</option>
      </select>
      <button class="del-btn" onclick="delUri(${i})">×</button>
    </div>`).join('')}
    <button class="btn-ghost" onclick="addUri()">+ Ajouter manuellement</button>
  </div>

  <div class="card">
    <div class="card-title">📝 Notes</div>
    <textarea placeholder="Examen, toux, journée chargée..." onchange="S({notes:this.value})">${e.notes||''}</textarea>
  </div>`;
}

function renderMeals(){
  const e=E();
  return `
  ${(e.meals||[]).map((m,i)=>`<div class="meal-card">
    <div class="flex between center" style="margin-bottom:6px">
      <span style="font-weight:600;font-size:13px">${m.label}</span>
      <div class="flex center" style="gap:5px">
        <input type="time" value="${m.time||''}" style="width:85px;padding:3px 6px;font-size:11px" onchange="updMeal(${i},'time',this.value)">
        ${i>=3?`<button class="del-btn" onclick="delMeal(${i})">×</button>`:''}
      </div>
    </div>
    <div class="flex center" style="gap:5px;margin-bottom:6px">
      <input type="text" id="meal-desc-${i}" value="${m.desc||''}" placeholder="Description ou 🎤 dicte..." style="flex:1;font-size:12px" onchange="updMeal(${i},'desc',this.value)">
      <button class="mic-btn" id="mic-${i}" onclick="toggleVoice(${i})">🎤</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:3px">
      ${MCAT.map(c=>`<button class="cat-pill ${(m.cats||[]).includes(c)?'on':''}" onclick="toggleCat(${i},'${c}')">${ME[c]||''} ${c}</button>`).join('')}
    </div>
  </div>`).join('')}
  <button class="btn-ghost" onclick="addMeal()">+ Collation</button>
  <div class="card" style="margin-top:10px">
    <div class="card-title">📊 Résumé</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${MCAT.map(c=>{const n=(e.meals||[]).filter(m=>(m.cats||[]).includes(c)).length;if(!n)return'';
        return`<span class="pill on" style="background:${c==='Sucre/UT'?'rgba(239,68,68,.2)':'rgba(99,102,241,.2)'};color:${c==='Sucre/UT'?'var(--red)':'var(--accent)'}; border:none">${ME[c]} ×${n}</span>`}).join('')}
    </div>
  </div>`;
}

function renderHistory(){
  const sorted=Object.keys(state.entries).sort().reverse();
  if(!sorted.length)return'<div style="text-align:center;padding:40px;color:var(--dim)">Aucune entrée</div>';
  return sorted.slice(0,30).map(d=>{
    const x=state.entries[d],dd=new Date(d+'T12:00:00');
    const md=(x.medikinet||[]).filter(Boolean).length;
    return`<div class="hist-row ${d===td()?'today':''}" onclick="state.sel='${d}';state.tab='log';render()">
      <div class="flex between center" style="margin-bottom:3px">
        <span style="font-weight:600;font-size:13px">${DAYS[dd.getDay()]} ${dd.getDate()}/${(dd.getMonth()+1).toString().padStart(2,'0')}
          ${d===td()?'<span style="font-size:9px;color:var(--accent);margin-left:4px">auj.</span>':''}</span>
        <div style="display:flex;gap:5px;font-size:10px;color:var(--dim)">
          ${x.mood_am?`😊${x.mood_am}/${x.mood_pm||'–'}`:''}
          ${x.energy_am?` ⚡${x.energy_am}/${x.energy_pm||'–'}`:''}
          ${md?` 💊${md}`:''}
          ${x.hydration?` 💧${x.hydration}L`:''}
        </div>
      </div>
      <div style="font-size:10px;color:var(--dim)">
        ${(x.meals||[]).filter(m=>m.desc).length>0?(x.meals||[]).filter(m=>m.desc).length+' repas':''}
        ${x.bristol?' · Bristol '+x.bristol+(x.stool_color?' ('+x.stool_color.replace('_',' ')+')':''):''}
        ${(x.urinations||[]).length?' · 🚽'+(x.urinations||[]).length+'×':''}
        ${x.social!==null&&x.social!==undefined?' · '+SOCIAL[x.social]?.e:''}
        ${x.notes?' · "'+x.notes.slice(0,25)+(x.notes.length>25?'…':'')+'"':''}
      </div>
    </div>`;
  }).join('')+`<div style="text-align:center;margin-top:14px"><button style="font-size:11px;color:var(--red);background:none;border:none;cursor:pointer" onclick="if(confirm('Supprimer toutes les données ?')){state.entries={};save();render()}">Réinitialiser</button></div>`;
}

function render(){
  const e=E();const c=comp();
  const dO=new Date(state.sel+'T12:00:00');
  const wk=Array.from({length:7},(_,i)=>{const d=new Date(dO);d.setDate(dO.getDate()-dO.getDay()+i);return d.toISOString().slice(0,10)});

  let h=`<h1>Tracker</h1><div class="sub">${Object.keys(state.entries).length} jours enregistrés</div>
  <div class="week-bar" style="margin-top:10px">
    <button class="week-nav" onclick="shiftWeek(-7)">‹</button>
    ${wk.map(d=>{const dd=new Date(d+'T12:00:00');return`<button class="week-day ${d===state.sel?'sel':''} ${d===td()?'today':''}" onclick="state.sel='${d}';render()">
      <div style="font-size:9px;opacity:.6">${DAYS[dd.getDay()]}</div>
      <div style="font-size:13px;font-weight:600">${dd.getDate()}</div>
      ${state.entries[d]?'<div style="width:4px;height:4px;border-radius:2px;background:'+(d===state.sel?'#fff':'var(--accent)')+';margin:2px auto 0"></div>':''}
    </button>`}).join('')}
    <button class="week-nav" onclick="shiftWeek(7)">›</button>
  </div>`;

  if(state.tab!=='history'){
    h+=`<div class="flex between" style="font-size:10px;color:var(--dim);margin-bottom:3px"><span>Complétion</span><span>${c}%</span></div>
    <div class="completion"><div class="completion-fill" style="width:${c}%"></div></div>`;
  }

  if(state.tab==='log')h+=renderLog();
  else if(state.tab==='meals')h+=renderMeals();
  else h+=renderHistory();

  $('app').innerHTML=h;
  $('nav').innerHTML=['log:📋:Journal','meals:🍽:Repas','history:📊:Historique'].map(x=>{
    const[k,icon,l]=x.split(':');
    return`<button class="nav-btn ${state.tab===k?'active':''}" onclick="state.tab='${k}';render()"><span class="nav-icon">${icon}</span>${l}</button>`;
  }).join('');
}

// Actions
function shiftWeek(d){const o=new Date(state.sel+'T12:00:00');o.setDate(o.getDate()+d);state.sel=o.toISOString().slice(0,10);render()}
function toggleMed(i){const e=E();const m=[...(e.medikinet||[false,false,false])];m[i]=!m[i];const t=[...(e.med_times||['','',''])];t[i]=m[i]?now():'';S({medikinet:m,med_times:t})}
function setMedDose(i,d){const ds=[...(E().med_doses||[10,10,10])];ds[i]=d;S({med_doses:ds})}
function setMedTime(i,v){const t=[...(E().med_times||['','',''])];t[i]=v;S({med_times:t})}
function adjCreon(i,d){const c=[...(E().creon||[0,0,0])];c[i]=Math.max(0,Math.min(10,(c[i]||0)+d));S({creon:c})}
// Urination timer
window._uriStart=null;
window._uriInterval=null;
function toggleUriTimer(){
  if(window._uriStart){
    // Stop timer — save entry
    const elapsed=Math.round((Date.now()-window._uriStart)/1000);
    const startTime=new Date(window._uriStart);
    const timeStr=startTime.getHours().toString().padStart(2,'0')+':'+startTime.getMinutes().toString().padStart(2,'0');
    clearInterval(window._uriInterval);
    window._uriStart=null;
    window._uriInterval=null;
    const u=[...(E().urinations||[]),{time:timeStr,sec:elapsed,color:''}];
    S({urinations:u});
  } else {
    // Start timer
    window._uriStart=Date.now();
    window._uriInterval=setInterval(()=>{
      const el=document.getElementById('uri-timer-display');
      if(el){const s=Math.round((Date.now()-window._uriStart)/1000);el.textContent=s+'s';}
    },500);
    render();
  }
}
function addUri(){const u=[...(E().urinations||[]),{time:now(),sec:0,color:''}];S({urinations:u})}
function updUri(i,k,v){const u=[...(E().urinations||[])];u[i]={...u[i],[k]:v};S({urinations:u})}
function delUri(i){S({urinations:(E().urinations||[]).filter((_,j)=>j!==i)})}
function addMeal(){const m=[...(E().meals||[]),{label:'Collation',time:'',desc:'',cats:[]}];S({meals:m})}
function updMeal(i,k,v){const m=[...(E().meals||[])];m[i]={...m[i],[k]:v};S({meals:m})}
function delMeal(i){S({meals:(E().meals||[]).filter((_,j)=>j!==i)})}
function toggleCat(mi,cat){const m=[...(E().meals||[])];const c=m[mi].cats||[];m[mi]={...m[mi],cats:c.includes(cat)?c.filter(x=>x!==cat):[...c,cat]};S({meals:m})}

let activeRec=null;
function toggleVoice(i){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Reconnaissance vocale non disponible sur ce navigateur');return}
  const btn=document.getElementById('mic-'+i);
  if(activeRec){activeRec.stop();activeRec=null;return}
  const rec=new SR();
  rec.lang='fr-FR';rec.continuous=false;rec.interimResults=true;
  activeRec=rec;
  btn.classList.add('recording');
  const input=document.getElementById('meal-desc-'+i);
  const existing=input.value;
  rec.onresult=function(ev){
    let t='';for(let r=0;r<ev.results.length;r++)t+=ev.results[r][0].transcript;
    input.value=existing?(existing+' '+t):t;
  };
  rec.onend=function(){
    btn.classList.remove('recording');
    activeRec=null;
    updMeal(i,'desc',input.value);
  };
  rec.onerror=function(ev){
    btn.classList.remove('recording');
    activeRec=null;
    if(ev.error!=='aborted')alert('Erreur micro: '+ev.error);
  };
  rec.start();
}

render();

// Service Worker for true offline support
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='ht-cache-v2';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/tracker.html'])).then(()=>self.skipWaiting()))});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));return res}).catch(()=>caches.match('/tracker.html'))))});
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
